<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact | MedTechAI</title>
  <meta name="description" content="Contact Arab MedTechAI Organization. Reach our team in Abu Dhabi for partnerships, support, or inquiries about our AI medical platforms."/>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Inter,system-ui,sans-serif;color:#1e293b;background:#fff;line-height:1.5;-webkit-font-smoothing:antialiased}
    a{text-decoration:none;color:#2563eb}
    a:hover{text-decoration:underline}
    .wrap{max-width:960px;margin:0 auto;padding:0 20px}
    .hdr{display:flex;align-items:center;justify-content:space-between;height:48px;padding:0 20px;background:#0f172a}
    .hdr-logo{font-size:16px;font-weight:700;color:#fff;letter-spacing:-.3px}
    .hdr-logo em{font-style:normal;color:#38bdf8}
    .hdr-nav{display:flex;gap:4px}
    .hdr-nav a{padding:6px 12px;font-size:13px;font-weight:500;color:#94a3b8;border-radius:4px}
    .hdr-nav a:hover{background:rgba(255,255,255,.08);text-decoration:none;color:#fff}
    .hdr-nav a.act{color:#38bdf8}
    .sec-h{font-size:12px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
    .ftr{padding:20px 0;border-top:1px solid #f1f5f9;display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;gap:8px;font-size:12px;color:#94a3b8}
    .ftr-links{display:flex;gap:14px}
    .ftr-links a{color:#94a3b8}
    .ftr-links a:hover{color:#475569;text-decoration:underline}
    .info-line{font-size:14px;color:#475569;padding:5px 0}
    .info-line a{color:#2563eb}
    .frm{max-width:480px}
    .frm-group{margin-bottom:16px}
    .frm-group label{display:block;font-size:13px;font-weight:600;color:#475569;margin-bottom:4px}
    .frm-group input,.frm-group textarea{width:100%;padding:8px 10px;font-size:14px;font-family:Inter,system-ui,sans-serif;color:#1e293b;border:1px solid #e2e8f0;border-radius:4px;background:#fff;outline:none}
    .frm-group input:focus,.frm-group textarea:focus{border-color:#2563eb}
    .frm-group textarea{resize:vertical;min-height:100px}
    .btn{padding:8px 16px;font-size:14px;font-weight:600;font-family:Inter,system-ui,sans-serif;color:#fff;background:#2563eb;border:none;border-radius:4px;cursor:pointer}
    .btn:hover{background:#1d4ed8}
  </style>
</head>
<body>

<div class="wrap">
<header class="hdr">
  <a href="/" class="hdr-logo">MedTech<em>AI</em></a>
  <nav class="hdr-nav">
    <a href="/">Home</a>
    <a href="/tools/">Tools</a>
    <a href="/about/">About</a>
    <a href="/contact/" class="act">Contact</a>
  </nav>
</header>

  <main style="padding:40px 0">

    <h2 class="sec-h">Contact</h2>

    <div class="info-line">Location — Abu Dhabi, United Arab Emirates</div>
    <div class="info-line">Email — <a href="mailto:contact@medtechai.net">contact@medtechai.net</a></div>
    <div class="info-line">Phone — <a href="tel:+971525397947">+971 52 539 7947</a></div>
    <div class="info-line">Business Hours — Mon-Fri 8AM-8PM, Saturday 9AM-5PM, Sunday Closed</div>

    <hr style="border:none;border-top:1px solid #f1f5f9;margin:24px 0"/>

    <div class="frm">
      <form action="mailto:contact@medtechai.net" method="GET">
        <div class="frm-group">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" required>
        </div>
        <div class="frm-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required>
        </div>
        <div class="frm-group">
          <label for="subject">Subject</label>
          <input type="text" id="subject" name="subject" required>
        </div>
        <div class="frm-group">
          <label for="message">Message</label>
          <textarea id="message" name="body" required></textarea>
        </div>
        <button type="submit" class="btn">Send</button>
      </form>
    </div>

  </main>

</div>
<footer class="ftr wrap">
  <span>&copy; 2025 Arab MedTechAI Organization</span>
  <div class="ftr-links">
    <a href="/terms/">Terms</a>
    <a href="/hipaa-compliance/">Compliance</a>
    <a href="/contact/">Contact</a>
  </div>
</footer>

</body>
</html>
