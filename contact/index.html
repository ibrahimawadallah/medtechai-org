<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact | MedTechAI</title>
  <meta name="description" content="Contact Arab MedTechAI Organization. Reach our team in Abu Dhabi for partnerships, support, or inquiries about our AI medical platforms."/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/tools/shared.css">
  <style>
    .wrap{max-width:960px;margin:0 auto;padding:0 20px}
    .info-line{font-size:14px;color:var(--slate3);padding:5px 0}
    .info-line a{color:var(--blue)}
    .frm{max-width:480px}
    .frm-group{margin-bottom:16px}
    .frm-group label{display:block;font-size:13px;font-weight:600;color:var(--slate3);margin-bottom:4px}
    .frm-group input,.frm-group textarea{width:100%;padding:8px 10px;font-size:14px;font-family:Inter,system-ui,sans-serif;color:var(--slate);border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);outline:none}
    .frm-group input:focus,.frm-group textarea:focus{border-color:var(--blue)}
    .frm-group textarea{resize:vertical;min-height:100px}
    .nav-home{color:#94a3b8;padding:4px 10px;border-radius:4px;font-size:13px;font-weight:500}
    .nav-home:hover{background:rgba(255,255,255,.08);color:#fff;text-decoration:none}
    .nav-home.act{color:#38bdf8}
  </style>
</head>
<body>

<nav class="nav" style="gap:16px">
  <a href="/" class="nav-logo">MedTech<span>AI</span></a>
  <span style="flex:1"></span>
  <a href="/" class="nav-home">Home</a>
  <a href="/tools/" class="nav-home">Tools</a>
  <a href="/about/" class="nav-home">About</a>
  <a href="/contact/" class="nav-home act">Contact</a>
</nav>

<div class="wrap">
  <main style="padding:40px 0">

    <h2 class="sec-h" style="font-size:12px;font-weight:700;color:var(--slate4);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px">Contact</h2>

    <div class="info-line">Location — Abu Dhabi, United Arab Emirates</div>
    <div class="info-line">Email — <a href="mailto:contact@medtechai.net">contact@medtechai.net</a></div>
    <div class="info-line">Phone — <a href="tel:+971525397947">+971 52 539 7947</a></div>
    <div class="info-line">Business Hours — Mon-Fri 8AM-8PM, Saturday 9AM-5PM, Sunday Closed</div>

    <hr style="border:none;border-top:1px solid var(--border);margin:24px 0"/>

    <div class="frm">
      <form action="mailto:contact@medtechai.net" method="GET">
        <div class="frm-group">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" required>
        </div>
        <div class="frm-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required>
        </div>
        <div class="frm-group">
          <label for="subject">Subject</label>
          <input type="text" id="subject" name="subject" required>
        </div>
        <div class="frm-group">
          <label for="message">Message</label>
          <textarea id="message" name="body" required></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Send</button>
      </form>
    </div>

  </main>
</div>

<footer class="footer">
  &copy; 2025 Arab MedTechAI Organization
  <div class="footer-links">
    <a href="/terms/">Terms</a>
    <a href="/hipaa-compliance/">Compliance</a>
    <a href="/contact/">Contact</a>
  </div>
</footer>

</body>
</html>
