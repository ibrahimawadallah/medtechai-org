<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Clinical Calculators — MedTechAI</title>
  <meta name="description" content="Validated medical calculators — BMI, GFR, CHA₂DS₂-VASc, Wells, APACHE II, SOFA, MELD, and more."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Sans:wght@500;600;700&display=swap" rel="stylesheet"/>

<body>

<nav class="nav">
  <a href="/tools/" class="nav-back">&#8592; All Tools</a>
  <span class="nav-sep">|</span>
  <a href="/" class="nav-logo">MedTech<span>AI</span></a>
</nav>

<div class="cat-banner advanced"></div>

<div class="breadcrumb">
  <a href="/">Home</a><span>/</span>
  <a href="/tools/">Tools</a><span>/</span>
  <span>Clinical Calculators</span>
</div>

<div class="tool-header advanced">
  <div>
    <span class="tool-cat advanced">Advanced Clinical</span>
    <h1 class="tool-name">Clinical Calculators</h1>
    <p class="tool-desc">Validated medical calculators — BMI, GFR, CHA₂DS₂-VASc, Wells, APACHE II, SOFA, MELD, and more.</p>
  </div>
</div>

<div class="main dashboard-layout">
  <!-- Category Sidebar -->
  <aside class="calc-sidebar" id="calcSidebar">
    <div class="sidebar-search">
      <input type="text" id="calcSearch" placeholder="Search calculators..." aria-label="Search calculators" />
    </div>
    <nav class="sidebar-nav">
      <button class="sidebar-btn active" data-cat="all" aria-pressed="true">All Calculators</button>
      <button class="sidebar-btn" data-cat="anthropometrics" aria-pressed="false">Anthropometrics</button>
      <button class="sidebar-btn" data-cat="renal" aria-pressed="false">Renal</button>
      <button class="sidebar-btn" data-cat="electrolytes" aria-pressed="false">Electrolytes</button>
      <button class="sidebar-btn" data-cat="cardiovascular" aria-pressed="false">Cardiovascular</button>
      <button class="sidebar-btn" data-cat="critical-care" aria-pressed="false">Critical Care</button>
      <button class="sidebar-btn" data-cat="hepatology" aria-pressed="false">Hepatology</button>
      <button class="sidebar-btn" data-cat="neurology" aria-pressed="false">Neurology</button>
      <button class="sidebar-btn" data-cat="pulmonary" aria-pressed="false">Pulmonary</button>
    </nav>
  </aside>

  <!-- Calculator Grid -->
  <div class="calc-grid-container">
    <div class="calc-grid" id="calcGrid">
      <!-- Calculators injected by JS -->
    </div>

    <!-- Input Panel (expands when calculator selected) -->
    <div class="calc-input-panel" id="calcInputPanel" style="display:none">
      <div class="input-panel-header">
        <h3 id="inputPanelTitle">Calculator Name</h3>
        <button class="btn-close" id="closeInputPanel" aria-label="Close calculator panel">&times;</button>
      </div>
      <div class="input-panel-body" id="calcInputs"></div>
      <div class="input-panel-footer">
        <button class="btn btn-primary" id="calcRunBtn">Calculate</button>
      </div>
    </div>
  </div>

  <!-- Result Panel -->
  <div class="result-panel" id="resultPanel">
    <div id="resultBody"></div>
    <div class="btn-bar no-print">
      <button class="btn btn-outline btn-sm" onclick="window.print()">Print</button>
      <button class="btn btn-outline btn-sm" onclick="clearResult()">Clear</button>
    </div>
  </div>
</div>

<footer class="footer">
  &copy; 2025 Arab MedTechAI Organization
</footer>

<style>
  /* Dashboard Layout */
  .dashboard-layout {
    display: grid;
    grid-template-columns: 220px 1fr;
    grid-template-rows: auto auto;
    gap: 20px;
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px;
  }
  .calc-sidebar {
    grid-row: 1 / 3;
    position: sticky;
    top: 20px;
    align-self: start;
  }
  .calc-grid-container {
    min-height: 400px;
  }
  .result-panel {
    display: none;
    grid-column: 2;
  }

  /* Sidebar */
  .sidebar-search {
    margin-bottom: 16px;
  }
  .sidebar-search input {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 13px;
    font-family: var(--font);
  }
  .sidebar-search input:focus {
    outline: none;
    border-color: var(--teal);
    box-shadow: 0 0 0 3px rgba(56,184,174,.15);
  }
  .sidebar-nav {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .sidebar-btn {
    display: block;
    width: 100%;
    padding: 10px 14px;
    text-align: left;
    font-size: 13px;
    font-weight: 500;
    color: var(--slate3);
    background: transparent;
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    transition: all .15s;
  }
  .sidebar-btn:hover {
    background: var(--teal-bg);
    color: var(--teal);
  }
  .sidebar-btn.active {
    background: var(--teal);
    color: #fff;
  }
  .sidebar-btn:focus-visible,
  .calc-card:focus-visible {
    outline: 2px solid var(--teal);
    outline-offset: 2px;
  }
  .btn-close:focus-visible {
    outline: 2px solid var(--teal);
    outline-offset: 2px;
  }

  /* Calculator Grid */
  .calc-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 12px;
  }
  .calc-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    cursor: pointer;
    transition: all .2s;
    text-align: center;
  }
  .calc-card:hover {
    border-color: var(--teal);
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(56,184,174,.15);
  }
  .calc-card.selected {
    border-color: var(--teal);
    background: var(--teal-bg);
  }
  .calc-card-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--slate);
    margin-bottom: 6px;
  }
  .calc-card-tag {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .03em;
    padding: 2px 8px;
    border-radius: 10px;
    display: inline-block;
  }
  .tag-anthropometrics { background: #dbeafe; color: #1e40af; }
  .tag-renal { background: #d1fae5; color: #065f46; }
  .tag-electrolytes { background: #fef3c7; color: #92400e; }
  .tag-cardiovascular { background: #fee2e2; color: #991b1b; }
  .tag-critical-care { background: #ede9fe; color: #5b21b6; }
  .tag-hepatology { background: #fce7f3; color: #9d174d; }
  .tag-neurology { background: #e0e7ff; color: #3730a3; }
  .tag-pulmonary { background: #ccfbf1; color: #115e59; }

  /* Input Panel */
  .calc-input-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-top: 20px;
    box-shadow: var(--shadow);
  }
  .input-panel-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    background: #f8fafc;
  }
  .input-panel-header h3 {
    font-size: 16px;
    font-weight: 600;
    color: var(--slate);
  }
  .btn-close {
    background: none;
    border: none;
    font-size: 20px;
    color: var(--slate4);
    cursor: pointer;
  }
  .btn-close:hover {
    color: var(--red);
  }
  .input-panel-body {
    padding: 20px;
  }
  .input-panel-footer {
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    background: #f8fafc;
  }

  /* Form fields inside panel */
  .input-panel-body .field {
    margin-bottom: 16px;
  }
  .input-panel-body .field label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--slate2);
    margin-bottom: 6px;
  }
  .input-panel-body .field input,
  .input-panel-body .field select {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 14px;
    font-family: var(--font);
  }
  .input-panel-body .field input:focus,
  .input-panel-body .field select:focus {
    outline: none;
    border-color: var(--teal);
    box-shadow: 0 0 0 3px rgba(56,184,174,.15);
  }
  .field-check {
    margin-bottom: 12px;
  }
  .field-check .check-label {
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    font-size: 14px;
    color: var(--slate);

  .field-check .check-label input[type="checkbox"] {

    height: 18px;
    accent-color: var(--teal);
    cursor: pointer;
  }
  .input-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;

  /* Result styling */
  .result-panel.on {
    display: block;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    box-shadow: var(--shadow);
  }
  .result-value {
    font-size: 32px;
    font-weight: 700;
    color: var(--teal);
    margin-bottom: 8px;
  }
  .result-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--slate4);
    text-transform: uppercase;
    letter-spacing: .04em;
    margin-bottom: 4px;
  }
  .result-interpretation {
    font-size: 14px;
    color: var(--slate);
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    line-height: 1.6;
  }
  .result-ref {
    font-size: 12px;
    color: var(--slate4);
    margin-top: 8px;
  }

  /* Responsive */
  @media (max-width: 900px) {
    .dashboard-layout {
      grid-template-columns: 1fr;
    }
    .calc-sidebar {
      grid-row: auto;
      position: static;
    }
    .sidebar-nav {
      flex-direction: row;
      flex-wrap: wrap;
      gap: 8px;
    }
    .sidebar-btn {
      width: auto;
    }
    .result-panel {
      grid-column: 1;
    }
    .calc-grid {
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    }
  }
  @media (max-width: 500px) {
    .calc-grid {
      grid-template-columns: 1fr 1fr;
    }
    .input-row {
      grid-template-columns: 1fr;

</style>

<script>
const CALCULATORS = [
  // Anthropometrics
  { id: 'bmi', name: 'BMI', category: 'anthropometrics', local: true },
  { id: 'bsa', name: 'BSA', category: 'anthropometrics', local: true },
  { id: 'ibw', name: 'Ideal Body Weight', category: 'anthropometrics', local: true },
  { id: 'adj-bw', name: 'Adjusted Body Weight', category: 'anthropometrics', local: true },

  // Renal
  { id: 'gfr', name: 'GFR (CKD-EPI)', category: 'renal', local: true },
  { id: 'crcl', name: 'Creatinine Clearance', category: 'renal', local: true },
  { id: 'fena', name: 'FENa', category: 'renal', local: true },
  { id: 'bun-cr', name: 'BUN/Cr Ratio', category: 'renal', local: true },

  // Electrolytes
  { id: 'corrected-ca', name: 'Corrected Ca²⁺', category: 'electrolytes', local: true },
  { id: 'anion-gap', name: 'Anion Gap', category: 'electrolytes', local: true },
  { id: 'na-correction', name: 'Na Correction', category: 'electrolytes', local: true },
  { id: 'osm-gap', name: 'Osmolality Gap', category: 'electrolytes', local: true },
  { id: 'delta-delta', name: 'Delta-Delta', category: 'electrolytes', local: true },

  // Cardiovascular
  { id: 'chads2-vasc', name: 'CHA₂DS₂-VASc', category: 'cardiovascular', local: true },
  { id: 'wells-dvt', name: 'Wells DVT', category: 'cardiovascular', local: true },
  { id: 'wells-pe', name: 'Wells PE', category: 'cardiovascular', local: true },
  { id: 'timi', name: 'TIMI Score', category: 'cardiovascular', api: true },
  { id: 'grace', name: 'GRACE Score', category: 'cardiovascular', api: true },
  { id: 'heart', name: 'HEART Score', category: 'cardiovascular', local: true },

  // Critical Care
  { id: 'apache-ii', name: 'APACHE II', category: 'critical-care', api: true },
  { id: 'qsofa', name: 'qSOFA', category: 'critical-care', local: true },
  { id: 'sofa', name: 'SOFA', category: 'critical-care', api: true },
  { id: 'curb-65', name: 'CURB-65', category: 'critical-care', local: true },
  { id: 'gcs', name: 'Glasgow Coma Scale', category: 'critical-care', local: true },

  // Hepatology
  { id: 'meld', name: 'MELD', category: 'hepatology', local: true },
  { id: 'meld-na', name: 'MELD-Na', category: 'hepatology', local: true },
  { id: 'child-pugh', name: 'Child-Pugh', category: 'hepatology', local: true },
  { id: 'fib4', name: 'FIB-4', category: 'hepatology', local: true },
  { id: 'apri', name: 'APRI', category: 'hepatology', local: true },

  // Neurology
  { id: 'alvarado', name: 'Alvarado Score', category: 'neurology', local: true },

// Pulmonary
  { id: 'wells-pe', name: 'Wells PE', category: 'pulmonary', local: true },
  { id: 'perc', name: 'PERC Rule', category: 'pulmonary', local: true },
  { id: 'geneva', name: 'Geneva Score', category: 'pulmonary', local: true },
];

let selectedCalc = null;

function renderGrid(filter = 'all', search = '') {
  const grid = document.getElementById('calcGrid');
  grid.innerHTML = '';
  const filtered = CALCULATORS.filter(c => {
    const catMatch = filter === 'all' || c.category === filter;
    const searchMatch = !search || c.name.toLowerCase().includes(search.toLowerCase());
    return catMatch && searchMatch;
  });
  filtered.forEach(calc => {
    const card = document.createElement('div');
    card.className = 'calc-card' + (selectedCalc?.id === calc.id ? ' selected' : '');
    card.dataset.id = calc.id;
    card.tabIndex = 0;
    card.setAttribute('role', 'button');
    card.setAttribute('aria-label', calc.name + ' calculator');
    card.innerHTML = `
      <div class="calc-card-name">${calc.name}</div>
      <span class="calc-card-tag tag-${calc.category}">${calc.category.replace('-', ' ')}</span>
    `;
    card.addEventListener('click', () => selectCalculator(calc));
    card.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        selectCalculator(calc);
      }
    });
    grid.appendChild(card);
  });
}

function selectCalculator(calc) {
  selectedCalc = calc;
  renderGrid(currentFilter, document.getElementById('calcSearch').value);
  showInputPanel(calc);
}

let currentFilter = 'all';
document.querySelectorAll('.sidebar-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.sidebar-btn').forEach(b => {
      b.classList.remove('active');
      b.setAttribute('aria-pressed', 'false');
    });
    btn.classList.add('active');
    btn.setAttribute('aria-pressed', 'true');
    currentFilter = btn.dataset.cat;
    renderGrid(currentFilter, document.getElementById('calcSearch').value);
  });
});

document.getElementById('calcSearch').addEventListener('input', (e) => {
  renderGrid(currentFilter, e.target.value);
});

renderGrid();

function showInputPanel(calc) {
  const panel = document.getElementById('calcInputPanel');
  const title = document.getElementById('inputPanelTitle');
  const inputs = document.getElementById('calcInputs');

  title.textContent = calc.name;
  inputs.innerHTML = '';

  const def = LOCAL_CALCS[calc.id];
  const fields = def ? def.fields : [];
  
  if (!def || calc.api) {
    if (calc.api && fields.length > 0) {
      // API calculator with field definitions - render inputs
      fields.forEach(field => {
        const div = document.createElement('div');
        div.className = field.type === 'check' ? 'field-check' : 'field';
        
        if (field.type === 'check') {
          div.innerHTML = `
            <label class="check-label">
              <input type="checkbox" id="cf_${field.id}" />
              <span>${field.label}</span>
            </label>
          `;
        } else if (field.type === 'select') {
          div.innerHTML = `
            <label>${field.label}</label>
            <select id="cf_${field.id}">
              ${field.options.map(o => `<option value="${o}">${o}</option>`).join('')}
            </select>
          `;
        } else {
          div.innerHTML = `
            <label>${field.label}</label>
            <input type="number" id="cf_${field.id}" step="${field.step || 'any'}" />
          `;
        }
        inputs.appendChild(div);
      });
    } else {
      inputs.innerHTML = '<p style="color:var(--slate4)">This calculator requires server-side computation.</p>';
    }
    panel.style.display = 'block';
    document.getElementById('calcRunBtn').onclick = () => runApiCalc(calc);
    return;
  }

  def.fields.forEach(field => {
    const div = document.createElement('div');
    div.className = field.type === 'check' ? 'field-check' : 'field';

    if (field.type === 'check') {
      div.innerHTML = `
        <label class="check-label">
          <input type="checkbox" id="cf_${field.id}" />
          <span>${field.label}</span>
        </label>
      `;
    } else if (field.type === 'select') {
      div.innerHTML = `
        <label>${field.label}</label>
        <select id="cf_${field.id}">
          ${field.options.map(o => `<option value="${o}">${o}</option>`).join('')}
        </select>
      `;
    } else {
      div.innerHTML = `
        <label>${field.label}</label>
        <input type="number" id="cf_${field.id}" step="any" />
      `;
    }
    inputs.appendChild(div);
  });

  panel.style.display = 'block';
  document.getElementById('calcRunBtn').onclick = () => runLocalCalc(calc);
}

document.getElementById('closeInputPanel').addEventListener('click', () => {
  document.getElementById('calcInputPanel').style.display = 'none';
  selectedCalc = null;
  renderGrid(currentFilter, document.getElementById('calcSearch').value);
});

async function runApiCalc(calc) {
  const btn = document.getElementById('calcRunBtn');
  const inputs = document.getElementById('calcInputs');
  
  // Collect any visible inputs
  const data = { calculator: calc.id };
  inputs.querySelectorAll('input, select').forEach(el => {
    if (el.id) data[el.id.replace('cf_', '')] = el.type === 'checkbox' ? el.checked : el.value;
  });
  
  btn.disabled = true;
  btn.textContent = 'Processing...';
  
  try {
    const res = await fetch('/api/tools/clinical-calculators', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });

    if (!res.ok) {
      showResult(calc.name, { value: 'Error', interpretation: `Server error (${res.status})`, reference: '' });
      return;
    }

    const result = await res.json();
    
    if (result.error) {
      showResult(calc.name, { value: 'Error', interpretation: result.error, reference: '' });
    } else {
      showResult(calc.name, {
        value: result.value || result.score || 'N/A',
        interpretation: result.interpretation || result.html || '',
        reference: result.reference || ''
      });
    }
  } catch (e) {
    showResult(calc.name, { value: 'Error', interpretation: 'Could not connect to server. Please try again.', reference: '' });
  } finally {
    btn.disabled = false;
    btn.textContent = 'Calculate';
  }
}

// Modify runLocalCalc to check if API needed
function runLocalCalc(calc) {
  if (calc.api) {
    runApiCalc(calc);
    return;
  }
  const def = LOCAL_CALCS[calc.id];
  if (!def) return;

  const fields = {};
  let hasError = false;

  def.fields.forEach(f => {
    const el = document.getElementById('cf_' + f.id);
    if (f.type === 'check') {
      fields[f.id] = el.checked;
    } else if (f.type === 'number') {
      const val = parseFloat(el.value);
      if (isNaN(val)) {
        hasError = true;
        el.style.borderColor = 'var(--red)';
      } else {
        el.style.borderColor = '';
        fields[f.id] = val;
      }
    } else {
      fields[f.id] = el.value;
    }
  });

  if (hasError) {
    showResult(calc.name, { value: 'Error', interpretation: 'Please enter valid numeric values for all fields.', reference: '' });
    return;
  }

  try {
    const result = def.calc(fields);
    showResult(calc.name, result);
  } catch (e) {
    showResult(calc.name, { value: 'Error', interpretation: 'Calculation error. Please check your inputs.', reference: '' });
  }
}

function showResult(name, result) {
  const panel = document.getElementById('resultPanel');
  const body = document.getElementById('resultBody');

  body.innerHTML = `
    <div class="result-label">${name}</div>
    <div class="result-value">${result.value}</div>
    <div class="result-interpretation">${result.interpretation}</div>
    ${result.reference ? `<div class="result-ref">${result.reference}</div>` : ''}
  `;

  panel.classList.add('on');
  panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function clearResult() {
   document.getElementById('resultPanel').classList.remove('on');
   document.getElementById('resultBody').innerHTML = '';
 }

const LOCAL_CALCS = {
  // API calculators (also need field definitions for input collection)
  timi: {
    api: true,
    fields: [
      { id: 'age', label: 'Age ≥65 (3 pts)', type: 'check' },
      { id: 'risk', label: '≥3 CAD risk factors (3 pts)', type: 'check' },
      { id: 'aspirin', label: 'Aspirin within 7d (or chronic) (4 pts)', type: 'check' },
      { id: 'recent_stemi', label: 'Recent STEMI (ST elevation >7d) (6 pts)', type: 'check' },
      { id: 'st_dep', label: 'ST depression ≥0.5mm (2 pts)', type: 'check' },
      { id: 'elevated', label: 'Elevated cardiac enzymes (4 pts)', type: 'check' },
      { id: 'sev_angina', label: 'Severe angina in last 48h (2 pts)', type: 'check' },
      { id: 'htn', label: 'Hypertension (2 pts)', type: 'check' },
      { id: 'known', label: 'Known CAD/SVD (2 pts)', type: 'check' }
    ]
  },
  grace: {
    api: true,
    fields: [
      { id: 'age', label: 'Age (years)', type: 'number' },
      { id: 'hr', label: 'Heart Rate (bpm)', type: 'number' },
      { id: 'sbp', label: 'Systolic BP (mmHg)', type: 'number' },
      { id: 'killip', label: 'Killip Class', type: 'select', options: ['I', 'II', 'III', 'IV'] },
      { id: 'creatinine', label: 'Creatinine (mg/dL)', type: 'number' },
      { id: 'elevated', label: 'Elevated cardiac enzymes', type: 'check' }
    ]
  },
  'apache-ii': {
    api: true,
    fields: [
      { id: 'temp', label: 'Temperature (°C)', type: 'number' },

  bmi: {
    fields: [
      { id: 'weight', label: 'Weight (kg)', type: 'number' },
      { id: 'height', label: 'Height (cm)', type: 'number' }
    ],
    calc: (f) => {
      const bmi = f.weight / ((f.height / 100) ** 2);
      let cat = bmi < 18.5 ? 'Underweight' : bmi < 25 ? 'Normal' : bmi < 30 ? 'Overweight' : bmi < 35 ? 'Obese Class I' : bmi < 40 ? 'Obese Class II' : 'Obese Class III';
      return { value: bmi.toFixed(1) + ' kg/m²', interpretation: 'Category: ' + cat, reference: 'Normal: 18.5–24.9 kg/m²' };
    }
  },
  bsa: {
    fields: [
      { id: 'weight', label: 'Weight (kg)', type: 'number' },
      { id: 'height', label: 'Height (cm)', type: 'number' }
    ],
    calc: (f) => {
      const bsa = Math.sqrt((f.weight * f.height) / 3600);
      return { value: bsa.toFixed(2) + ' m²', interpretation: 'Body Surface Area (Mosteller formula)', reference: 'Adult avg: 1.5–2.0 m²' };
    }
  },
  gfr: {
    fields: [
      { id: 'scr', label: 'Serum Creatinine (mg/dL)', type: 'number' },
      { id: 'age', label: 'Age (years)', type: 'number' },
      { id: 'sex', label: 'Sex', type: 'select', options: ['Female', 'Male'] },
      { id: 'race', label: 'Race', type: 'select', options: ['Non-Black', 'Black'] }
    ],
    calc: (f) => {
      const isFemale = f.sex === 'Female';
      const isBlack = f.race === 'Black';
      const k = isFemale ? 0.7 : 0.9;
      const alpha = isFemale ? -0.241 : -0.302;
      const scr = f.scr;
      let gfr = 142 * Math.pow(Math.min(scr / k, 1), alpha) * Math.pow(Math.max(scr / k, 1), -1.2) * Math.pow(0.9938, f.age);
      if (isFemale) gfr *= 1.012;
      if (isBlack) gfr *= 1.159;
      let stage = gfr >= 90 ? 'G1 – Normal' : gfr >= 60 ? 'G2 – Mildly decreased' : gfr >= 45 ? 'G3a – Mild-moderately decreased' : gfr >= 30 ? 'G3b – Moderately-severely decreased' : gfr >= 15 ? 'G4 – Severely decreased' : 'G5 – Kidney failure';
      return { value: Math.round(gfr) + ' mL/min/1.73m²', interpretation: 'CKD Stage: ' + stage, reference: 'Normal: ≥90 mL/min/1.73m²' };
    }
  },
  'corrected-ca': {
    fields: [
      { id: 'ca', label: 'Serum Calcium (mg/dL)', type: 'number' },
      { id: 'alb', label: 'Serum Albumin (g/dL)', type: 'number' }
    ],
    calc: (f) => {
      const cc = f.ca + 0.8 * (4 - f.alb);
      let interp = cc < 8.5 ? 'Hypocalcemia' : cc > 10.5 ? 'Hypercalcemia' : 'Normal';
      return { value: cc.toFixed(2) + ' mg/dL', interpretation: interp, reference: 'Normal: 8.5–10.5 mg/dL' };
    }
  },
  'anion-gap': {
    fields: [

      { id: 'hco3', label: 'Bicarbonate (mEq/L)', type: 'number' }
    ],
    calc: (f) => {
      const ag = f.na - (f.cl + f.hco3);
      let interp = ag > 12 ? 'Elevated — consider MUDPILES' : 'Normal';

  'chads2-vasc': {

  // Renal
  crcl: {
    fields: [
      { id: 'age', label: 'Age (years)', type: 'number' },
      { id: 'weight', label: 'Weight (kg)', type: 'number' },
      { id: 'scr', label: 'Serum Creatinine (mg/dL)', type: 'number' },
      { id: 'sex', label: 'Sex', type: 'select', options: ['Male', 'Female'] }
    ],
    calc: (f) => {
      let crcl = ((140 - f.age) * f.weight) / (72 * f.scr);
      if (f.sex === 'Female') crcl *= 0.85;
      let interp = crcl >= 90 ? 'Normal kidney function' : crcl >= 60 ? 'Mildly reduced' : crcl >= 30 ? 'Moderately reduced' : crcl >= 15 ? 'Severely reduced' : 'Kidney failure';
      return { value: crcl.toFixed(1) + ' mL/min', interpretation: interp + ' (Cockcroft-Gault)', reference: 'Normal: 90–120 mL/min' };
    }
  },
  fena: {
    fields: [
      { id: 'una', label: 'Urine Na (mEq/L)', type: 'number' },
      { id: 'scr', label: 'Serum Cr (mg/dL)', type: 'number' },
      { id: 'ucr', label: 'Urine Cr (mg/dL)', type: 'number' },
      { id: 'sna', label: 'Serum Na (mEq/L)', type: 'number' }
    ],
    calc: (f) => {
      const fena = (f.una * f.scr) / (f.ucr * f.sna) * 100;
      let interp = fena < 1 ? 'Pre-renal azotemia' : fena > 2 ? 'Intrinsic renal disease' : 'Indeterminate';
      return { value: fena.toFixed(2) + '%', interpretation: interp, reference: 'Pre-renal: <1%, Intrinsic: >2%' };

  'bun-cr': {

      { id: 'cr', label: 'Serum Creatinine (mg/dL)', type: 'number' }
    ],
    calc: (f) => {
      const ratio = f.bun / f.cr;
      let interp = ratio > 20 ? 'Elevated — consider pre-renal, GI bleed, high protein intake' : ratio < 10 ? 'Low — consider hepatic failure, malnutrition, rhabdomyolysis' : 'Normal';
      return { value: ratio.toFixed(1), interpretation: interp, reference: 'Normal: 10:1 to 20:1' };

  // Anthropometrics
  ibw: {
    fields: [
      { id: 'height', label: 'Height (inches)', type: 'number' },
      { id: 'sex', label: 'Sex', type: 'select', options: ['Male', 'Female'] }
    ],
    calc: (f) => {
      let ibw;
      if (f.sex === 'Male') {
        ibw = 50 + 2.3 * (f.height - 60);
      } else {
        ibw = 45.5 + 2.3 * (f.height - 60);
      }
      return { value: ibw.toFixed(1) + ' kg', interpretation: 'Ideal Body Weight (Devine formula)', reference: 'Use for drug dosing when actual weight is not ideal' };
    }
  },
  'adj-bw': {
    fields: [
      { id: 'height', label: 'Height (inches)', type: 'number' },
      { id: 'actual', label: 'Actual Weight (kg)', type: 'number' },
      { id: 'sex', label: 'Sex', type: 'select', options: ['Male', 'Female'] }
    ],
    calc: (f) => {
      let ibw;
      if (f.sex === 'Male') {
        ibw = 50 + 2.3 * (f.height - 60);
      } else {
        ibw = 45.5 + 2.3 * (f.height - 60);
      }
      const adjBW = ibw + 0.4 * (f.actual - ibw);
      return { value: adjBW.toFixed(1) + ' kg', interpretation: 'Adjusted Body Weight — use for drug dosing in obese patients', reference: 'IBW: ' + ibw.toFixed(1) + ' kg' };

  // Electrolytes
  'na-correction': {
    fields: [
      { id: 'na', label: 'Measured Na (mEq/L)', type: 'number' },
      { id: 'glucose', label: 'Serum Glucose (mg/dL)', type: 'number' }
    ],
    calc: (f) => {
      const corrNa = f.na + 1.6 * ((f.glucose - 100) / 100);
      let interp = corrNa < 135 ? 'True hyponatremia' : corrNa > 145 ? 'True hypernatremia' : 'Normal sodium';
      return { value: corrNa.toFixed(1) + ' mEq/L', interpretation: interp, reference: 'Corrected for hyperglycemia (1.6 mEq/L per 100 mg/dL glucose above 100)' };
    }
  },
  'osm-gap': {
    fields: [
      { id: 'measured', label: 'Measured Osmolality (mOsm/kg)', type: 'number' },
      { id: 'na', label: 'Sodium (mEq/L)', type: 'number' },
      { id: 'glucose', label: 'Glucose (mg/dL)', type: 'number' },
      { id: 'bun', label: 'BUN (mg/dL)', type: 'number' }
    ],
    calc: (f) => {
      const calcOsm = 2 * f.na + f.glucose / 18 + f.bun / 2.8;
      const gap = f.measured - calcOsm;
      let interp = gap > 10 ? 'Elevated — consider toxic alcohol ingestion (methanol, ethylene glycol)' : gap < -10 ? 'Negatively elevated — consider lab error or low osmolality states' : 'Normal';
      return { value: gap.toFixed(1) + ' mOsm/kg', interpretation: interp, reference: 'Normal: -10 to +10 mOsm/kg' };
    }
  },
  'delta-delta': {
    fields: [
      { id: 'ag', label: 'Anion Gap', type: 'number' },
      { id: 'hco3', label: 'Bicarbonate (mEq/L)', type: 'number' }
    ],
    calc: (f) => {
      const deltaRatio = (f.ag - 12) / (24 - f.hco3);
      let interp;
      if (deltaRatio > 2) {
        interp = 'Concurrent metabolic alkalosis or pre-existing elevated HCO3';
      } else if (deltaRatio < 1) {
        interp = 'Concurrent non-anion gap metabolic acidosis';
      } else {
        interp = 'Pure anion gap metabolic acidosis';
      }
      return { value: deltaRatio.toFixed(2), interpretation: interp, reference: 'Delta Ratio: (AG - 12) / (24 - HCO3)' };
    }
  },

  // Hepatology
  meld: {
    fields: [
      { id: 'bili', label: 'Bilirubin (mg/dL)', type: 'number' },
      { id: 'inr', label: 'INR', type: 'number' },
      { id: 'cr', label: 'Creatinine (mg/dL)', type: 'number' }
    ],
    calc: (f) => {
      const bili = Math.max(f.bili, 1);
      const inr = Math.max(f.inr, 1);
      const cr = Math.max(f.cr, 1);
      const meld = 3.78 * Math.log(bili) + 11.2 * Math.log(inr) + 9.57 * Math.log(cr) + 6.43;
      const score = Math.round(Math.max(meld, 0));
      let interp = score >= 40 ? 'Very high mortality — urgent transplant evaluation' : score >= 30 ? 'High 3-month mortality' : score >= 15 ? 'Moderate 3-month mortality' : 'Low 3-month mortality';
      return { value: score + ' points', interpretation: interp, reference: 'MELD predicts 3-month mortality in liver disease' };
    }
  },
  'meld-na': {
    fields: [
      { id: 'bili', label: 'Bilirubin (mg/dL)', type: 'number' },
      { id: 'inr', label: 'INR', type: 'number' },
      { id: 'cr', label: 'Creatinine (mg/dL)', type: 'number' },
      { id: 'na', label: 'Sodium (mEq/L)', type: 'number' }
    ],
    calc: (f) => {
      const bili = Math.max(f.bili, 1);
      const inr = Math.max(f.inr, 1);
      const cr = Math.max(f.cr, 1);
      const na = Math.min(Math.max(f.na, 125), 137);
      const meld = 3.78 * Math.log(bili) + 11.2 * Math.log(inr) + 9.57 * Math.log(cr) + 6.43;
      const meldNa = meld + 1.32 * (137 - na) - 0.033 * meld * (137 - na);
      const score = Math.round(Math.max(meldNa, 0));
      let interp = score >= 40 ? 'Very high mortality — urgent transplant evaluation' : score >= 30 ? 'High 3-month mortality' : score >= 15 ? 'Moderate 3-month mortality' : 'Low 3-month mortality';
      return { value: score + ' points', interpretation: interp, reference: 'MELD-Na includes sodium for better prediction' };
    }
  },

      return { value: score + '/15 (Class ' + class_letter + ')', interpretation: interp, reference: 'A: 5-6, B: 7-9, C: 10-15' };

  fib4: {
    fields: [
      { id: 'age', label: 'Age (years)', type: 'number' },
      { id: 'ast', label: 'AST (U/L)', type: 'number' },

    ],
    calc: (f) => {
      const apri = (f.ast / f.uln) / f.plt * 100;
      let interp = apri > 2 ? 'Advanced fibrosis likely' : apri < 0.5 ? 'Advanced fibrosis unlikely' : 'Indeterminate';

      { id: 'nausea', label: 'Nausea/vomiting (1 pt)', type: 'check' },
      { id: 'tenderness', label: 'Tenderness in RLQ (2 pts)', type: 'check' },
      { id: 'rebound', label: 'Rebound pain (1 pt)', type: 'check' },
      { id: 'temp', label: 'Elevated temperature (1 pt)', type: 'check' },
      { id: 'leuk', label: 'Leukocytosis (2 pts)', type: 'check' },
      { id: 'shift', label: 'Neutrophilic shift to left (1 pt)', type: 'check' }
    ],
    calc: (f) => {
      const score = (f.migration ? 1 : 0) + (f.anorexia ? 1 : 0) + (f.nausea ? 1 : 0) + (f.tenderness ? 2 : 0) + (f.rebound ? 1 : 0) + (f.temp ? 1 : 0) + (f.leuk ? 2 : 0) + (f.shift ? 1 : 0);
      let risk = score >= 7 ? 'High' : score >= 5 ? 'Indeterminate' : 'Low';
      let interp = risk === 'Low' ? 'Appendicitis unlikely' : risk === 'Indeterminate' ? 'Consider CT or observation' : 'Appendicitis likely — consider surgery';
      return { value: score + '/10', interpretation: interp, reference: 'Low: <4, Indeterminate: 5-6, High: 7-10' };
    }
  },

  // Pulmonary
  perc: {
    fields: [
      { id: 'age50', label: 'Age ≥50 (1 pt)', type: 'check' },
      { id: 'hr', label: 'HR ≥100 (1 pt)', type: 'check' },
      { id: 'sao2', label: 'SaO2 <95% (1 pt)', type: 'check' },
      { id: 'leg', label: 'Unilateral leg swelling (1 pt)', type: 'check' },
      { id: 'hemo', label: 'Hemoptysis (1 pt)', type: 'check' },
      { id: 'surgery', label: 'Recent surgery (1 pt)', type: 'check' },
      { id: 'dvthx', label: 'Previous DVT/PE (1 pt)', type: 'check' },
      { id: 'hormone', label: 'Hormone use (1 pt)', type: 'check' }
    ],
    calc: (f) => {
      const score = (f.age50 ? 1 : 0) + (f.hr ? 1 : 0) + (f.sao2 ? 1 : 0) + (f.leg ? 1 : 0) + (f.hemo ? 1 : 0) + (f.surgery ? 1 : 0) + (f.dvthx ? 1 : 0) + (f.hormone ? 1 : 0);
      let risk = score >= 1 ? 'High risk' : 'Low risk';
      let interp = risk === 'Low' ? 'PE very unlikely — DVT/PE can be ruled out without imaging' : 'PE cannot be excluded — consider D-dimer or imaging';
      return { value: score + '/8', interpretation: interp, reference: 'Low risk: 0, High risk: ≥1' };
    }
  },
  geneva: {
    fields: [
      { id: 'age65', label: 'Age >65 (1 pt)', type: 'check' },
      { id: 'dvthx', label: 'Previous DVT/PE (3 pts)', type: 'check' },
      { id: 'surgery', label: 'Surgery/fracture (2 pts)', type: 'check' },
      { id: 'malign', label: 'Malignancy (2 pts)', type: 'check' },
      { id: 'limb_pain', label: 'Unilateral lower limb pain (3 pts)', type: 'check' },
      { id: 'hemo', label: 'Hemoptysis (2 pts)', type: 'check' },
      { id: 'hr75', label: 'HR 75-94 (3 pts)', type: 'check' },
      { id: 'hr95', label: 'HR ≥95 (5 pts)', type: 'check' },
      { id: 'tender', label: 'Pain on deep vein palpation (4 pts)', type: 'check' },
      { id: 'edema', label: 'Unilateral lower limb edema (4 pts)', type: 'check' }
    ],
    calc: (f) => {
      const score = (f.age65 ? 1 : 0) + (f.dvthx ? 3 : 0) + (f.surgery ? 2 : 0) + (f.malign ? 2 : 0) + (f.limb_pain ? 3 : 0) + (f.hemo ? 2 : 0) + (f.hr75 ? 3 : 0) + (f.hr95 ? 5 : 0) + (f.tender ? 4 : 0) + (f.edema ? 4 : 0);
      let risk = score >= 11 ? 'High' : score >= 4 ? 'Moderate' : 'Low';
      let interp = risk === 'Low' ? 'PE unlikely — consider D-dimer' : risk === 'Moderate' ? 'PE possible — consider imaging' : 'PE likely — CT pulmonary angiography indicated';
      return { value: score + ' points', interpretation: interp, reference: 'Low: 0-3, Moderate: 4-10, High: ≥11' };
    }
  }
};
