name: Keep Alive
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping medtechai.net
        run: curl -sS -o /dev/null -w "%{http_code}" https://medtechai.net
      - name: Ping Render direct
        run: curl -sS -o /dev/null -w "%{http_code}" https://pharmgenius-production-main.onrender.com
