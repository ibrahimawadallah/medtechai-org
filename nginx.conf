# Nginx configuration for MedTechAI PHP application
# This replaces the .htaccess rules for Render's Nginx server

# Serve static assets directly
location ~ ^_next/.*$ {
    try_files $uri $uri/ =404;
    # Add caching headers if needed
}

# API tools handler
location ~ ^/api/tools/([a-z0-9-]+)/?$ {
    try_files $uri /api/tools/handler.php?$query_string;
    fastcgi_pass   php;
    fastcgi_index  index.php;
    fastcgi_split_path_info ^(.+?\.php)(/.*)$;
    fastcgi_param  SCRIPT_FILENAME  $document_root$fastcgi_script_name;
    include        fastcgi_params;
}

# All other API requests (if any) - proxy to backend if separate, otherwise handle locally
# For now, we'll let them fall through to PHP processor

# SPA fallback - serve index.html for all other routes
location / {
    try_files $uri $uri/ /index.html;
}

# PHP processing for any PHP files
location ~ \.php$ {
    try_files $uri =404;
    fastcgi_pass   php;
    fastcgi_index  index.php;
    fastcgi_split_path_info ^(.+?\.php)(/.*)$;
    fastcgi_param  SCRIPT_FILENAME  $document_root$fastcgi_script_name;
    include        fastcgi_params;
}

# Static files caching
location ~* \.(jpg|jpeg|png|gif|ico|css|js)$ {
    expires 365d;
    add_header Cache-Control "public, immutable";
}