<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 — Page Not Found | MedTechAI</title>
  <meta name="description" content="The page you are looking for does not exist."/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Sans:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/tools/shared.css">
  <style>
    :root{--teal:#38b8ae;--navy:#1a2d3a;--mint:#e6f7f6;--slate-gray:#6b8a8e;--bg:#f5fafa}
    body{background:var(--bg);color:var(--navy);display:flex;flex-direction:column;min-height:100vh}
    a{color:var(--teal);text-decoration:none}
    a:hover{text-decoration:underline}
    .nav-home{color:#94a3b8;padding:4px 10px;border-radius:4px;font-size:13px;font-weight:500}
    .nav-home:hover{background:rgba(255,255,255,.08);color:#fff;text-decoration:none}
    main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 24px}
    .error-card{text-align:center;max-width:480px}
    .error-code{font-family:'DM Sans',sans-serif;font-size:96px;font-weight:700;color:var(--teal);line-height:1;margin-bottom:8px}
    .error-title{font-family:'DM Sans',sans-serif;font-size:24px;font-weight:700;color:var(--navy);margin-bottom:12px}
    .error-desc{font-size:14px;color:var(--slate-gray);line-height:1.6;margin-bottom:28px}
    .error-link{display:inline-flex;align-items:center;gap:8px;padding:12px 28px;border-radius:12px;font-size:14px;font-weight:600;font-family:'DM Sans',sans-serif;background:var(--teal);color:#fff;transition:opacity .2s}
    .error-link:hover{opacity:.9;text-decoration:none}
    .footer{background:var(--navy)!important;color:rgba(255,255,255,.6)!important}
    .footer a{color:rgba(255,255,255,.5)!important}
    .footer a:hover{color:var(--white)!important}
  </style>
</head>
<body>

<nav class="nav" style="gap:16px">
  <a href="/" class="nav-logo">MedTech<span>AI</span></a>
  <span style="flex:1"></span>
  <a href="/" class="nav-home">Home</a>
  <a href="/tools/" class="nav-home">Tools</a>
  <a href="/about/" class="nav-home">About</a>
  <a href="/contact/" class="nav-home">Contact</a>
</nav>

<main>
  <div class="error-card">
    <div class="error-code">404</div>
    <h1 class="error-title">Page not found</h1>
    <p class="error-desc">The page you are looking for does not exist or has been moved. Let us help you find what you need.</p>
    <a href="/" class="error-link">Back to home &rarr;</a>
  </div>
</main>

<footer class="footer">
  &copy; 2025 Arab MedTechAI Organization
  <div class="footer-links">
    <a href="/terms/">Terms</a>
    <a href="/hipaa-compliance/">Compliance</a>
    <a href="/contact/">Contact</a>
  </div>
</footer>

</body>
</html>
